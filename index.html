<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus objetivos do ano</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="conteudo-principal">
        <h2 class="titulo-principal" id="titulo-digitado"></h2>
        <div class="botoes">
            <button class="botao">Cursos na Alura</button>
            <button class="botao">Criar projetos em Javascript</button>
            <button class="botao">Criar um portfolio</button>
            <button class="botao">Atualizar meu currículo</button>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const titulo = document.getElementById('titulo-digitado');
            const textoOriginal = "Meus Objetivos do ano";
            let indice = 0;
            
            function digitarTitulo() {
                if (indice < textoOriginal.length) {
                    titulo.innerHTML = textoOriginal.substring(0, indice + 1) + '<span class="cursor">|</span>';
                    indice++;
                    setTimeout(digitarTitulo, 120);
                } else {
                    titulo.innerHTML = textoOriginal + '<span class="cursor">|</span>';
                }
            }
            
            digitarTitulo();
        });
    </script>
</body>

</html>
